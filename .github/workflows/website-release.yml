name: Website Release
on:
  push:
    tags: ["website-v*"]
  workflow_dispatch:

concurrency:
  group: release-website
  cancel-in-progress: false

permissions:
  contents: read
  packages: write   # 让 GITHUB_TOKEN 能推镜像到 ghcr.io

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/keeper-website

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: mise install
      - run: mise run site-install
      - run: mise run site-test   # 质量门禁：构建镜像前先过单测

      # 从 git tag（website-vX.Y.Z）剥出版本号 X.Y.Z；手动触发无 tag 时回退用短 SHA
      - name: Resolve image tag
        id: meta
        run: |
          set -euo pipefail
          ref="${{ github.ref_name }}"
          if [[ "$ref" == website-v* ]]; then
            version="${ref#website-v}"
          else
            version="sha-${GITHUB_SHA::7}"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          # 上下文取仓库根，让 mise.toml 进上下文；Dockerfile 在子目录里
          context: .
          file: apps/website/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.meta.outputs.version }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
