name: Website Release
on:
  push:
    tags: ["website-v*"]
  workflow_dispatch:

concurrency:
  group: release-website
  cancel-in-progress: false

permissions:
  contents: read
  packages: write   # 让 GITHUB_TOKEN 能推镜像到 ghcr.io

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/keeper-website

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up mise
        uses: jdx/mise-action@v2
      - name: Install toolchain
        run: mise install
      - name: Install deps
        run: mise run site-install
      - name: Test
        run: mise run site-test   # 质量门禁：构建镜像前先过单测

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 标签交给标准工具 metadata-action：
      #   monorepo 前缀 tag 用 value=<git ref>+match=<正则> 从 website-vX.Y.Z 提取版本号 X.Y.Z
      #   （type=semver 默认只剥 v、不剥 website- 前缀，故按官方写法用 match 捕获版本段）；
      #   flavor latest=auto 是内置的「预发布感知」——仅非预发布版本才追加 latest，
      #   website-v1.2.3-rc.1 这类预发布不会动 latest，无需自己写 enable 条件；
      #   type=sha 仅在非 tag（如 workflow_dispatch 手动逃生口）时回退打 sha-<短SHA>。
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}},value=${{ github.ref_name }},match=website-v(.+)
            type=sha,enable=${{ github.ref_type != 'tag' }}
          flavor: |
            latest=auto

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          # 上下文取仓库根，让 mise.toml 进上下文；Dockerfile 在子目录里
          context: .
          file: apps/website/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
