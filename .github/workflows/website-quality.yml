name: Website Quality

# 可复用的 website 质量门禁：供 website-ci.yml（PR/push）与 website-release.yml
# （发版前）共同调用，保证两处校验用同一份定义，永不漂移。
on:
  workflow_call:

permissions:
  contents: read

jobs:
  website:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up mise
        uses: jdx/mise-action@v4
      - name: Install toolchain
        run: mise install
      - name: Install deps
        run: mise run site-install
      # site-build = vue-tsc --noEmit && vite build：类型检查 + 生产构建一并验证
      - name: Build (typecheck + vite build)
        run: mise run site-build
      - name: Test
        run: mise run site-test
