name: Desktop CI
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-desktop-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # 质量门禁抽到可复用 workflow，与 desktop-release.yml 发版前门禁共用同一份定义
  quality:
    uses: ./.github/workflows/desktop-quality.yml
