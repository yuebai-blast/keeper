<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>Keeper 留影 · Logo 预览</title>
  <style>
    body{margin:0;background:#101216;color:#EDEAE2;font:15px/1.6 'PingFang SC',Inter,system-ui,sans-serif}
    .wrap{max-width:1320px;margin:0 auto;padding:48px 24px}
    h1{font-weight:650;letter-spacing:-.5px}
    h1 b{color:#E7A23C}
    .muted{color:#73777F}
    .row{display:flex;flex-wrap:wrap;gap:24px;margin:32px 0}
    .card{background:#181B21;border:1px solid #262A32;border-radius:14px;padding:28px;display:flex;flex-direction:column;align-items:center;gap:16px}
    .card.light{background:#F5F2EA}
    .lbl{font-size:12px;letter-spacing:2px;color:#6B7079}
    img{display:block}
    .board img{width:100%;max-width:1240px;border-radius:14px}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Keeper <b>留影</b> · Logo</h1>
    <p class="muted">取景框（取景 / 圈定候选）+ K 字母（被框中、被留下的那一张）。矢量交付，可无损缩放。</p>

    <div class="row">
      <div class="card"><img src="keeper-mark-dark.svg" width="120" height="120" alt="深底标志"><span class="lbl">MARK · 深底</span></div>
      <div class="card light"><img src="keeper-mark.svg" width="120" height="120" alt="浅底标志"><span class="lbl">MARK · 浅底</span></div>
      <div class="card"><img src="keeper-app-icon.svg" width="120" height="120" alt="应用图标"><span class="lbl">APP ICON</span></div>
      <div class="card" style="color:#E7A23C"><img src="keeper-mark-mono.svg" width="120" height="120" alt="单色标志"><span class="lbl">MONO · currentColor</span></div>
    </div>

    <div class="row">
      <div class="card light" style="align-items:flex-start"><img src="keeper-wordmark.svg" width="480" alt="字标组合"><span class="lbl">WORDMARK LOCKUP</span></div>
    </div>

    <div class="row board">
      <div class="card" style="width:100%"><img src="keeper-brand-board.svg" alt="品牌标志板"><span class="lbl">BRAND BOARD</span></div>
    </div>
  </div>
</body>
</html>
