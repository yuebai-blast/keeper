# Keeper 官网部署：nginx 托管静态站点，容器内只听 80（明文 HTTP）。
# HTTPS/TLS 由宿主机上的反向代理或 Cloudflare 终止，容器本身不处理证书。
#
# 用法（在服务器上）：
#   export WEBSITE_TAG=0.1.0        # 要部署的版本（不写默认 latest）
#   docker compose pull            # 拉取镜像
#   docker compose up -d           # 启动/更新
#   docker compose logs -f         # 看日志
#   docker compose down            # 停止并移除
services:
  website:
    image: ghcr.io/yuebai-blast/keeper-website:${WEBSITE_TAG:-latest}
    container_name: keeper-website
    restart: unless-stopped
    # 只绑本机回环，明文 HTTP 不暴露公网；宿主机反代/Cloudflare 连 127.0.0.1:<宿主端口>
    # 宿主端口参数化（右侧容器端口固定 80）：export WEBSITE_PORT 可改
    ports:
      - "127.0.0.1:${WEBSITE_PORT:-9001}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
