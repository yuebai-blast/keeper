# Keeper 官网容器内 Nginx 站点配置（落在 /etc/nginx/conf.d/default.conf）。
# 容器只监听 80 明文 HTTP；HTTPS/HSTS 由前置反向代理或 Cloudflare 负责。

# GitHub API 反代缓存区（http context——本文件被 nginx.conf 的 http{} include，故可在 server 外写指令）。
# 把 releases 列表缓存几分钟，将真正打到 api.github.com 的请求压到远低于 60 次/小时的未认证限流。
proxy_cache_path /var/cache/nginx/gh levels=1:2 keys_zone=gh:1m max_size=16m inactive=1h use_temp_path=off;

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript image/svg+xml application/json;
    gzip_min_length 1024;

    # 下载页数据源：反代 GitHub REST 的 releases 列表（同源——避开浏览器对 api.github.com 的跨域；
    # 缓存——抹平 60/h 未认证限流）。前端从列表里过滤出最新 desktop-v* 正式版及其 dmg/exe 真实直链。
    # 取列表而非 /releases/latest：monorepo 多组件共用 Releases，latest 不分组件、会拉到 website 版。
    location = /api/gh/releases {
        # proxy_pass 带变量才会用 resolver 做「运行时」DNS 解析（GitHub 的 IP 常变，避免启动时解析过期后 502）
        resolver 1.1.1.1 8.8.8.8 valid=300s ipv6=off;
        set $gh_api api.github.com;
        proxy_ssl_server_name on;
        # per_page=10：releases 接口默认每页 30 条，这里收窄响应体（版本再多也固定上限）。
        # 取 10 而非 1/2：desktop 与 website 共用同一套 Releases，留足窗口避免最新 desktop-v* 被 website 版挤出。
        proxy_pass https://$gh_api/repos/yuebai-blast/keeper/releases?per_page=10;
        proxy_set_header Host api.github.com;
        proxy_set_header User-Agent keeper-website;          # GitHub API 强制要求 UA，缺了会 403
        proxy_set_header Accept application/vnd.github+json;
        # 可选：把未认证 60/h 提到认证 5000/h——在此注入只读 token（服务端机密，绝不进前端）：
        # proxy_set_header Authorization "Bearer <GITHUB_TOKEN>";

        proxy_cache gh;
        proxy_cache_valid 200 5m;                              # 命中期内零上游请求；过期才回源一次
        proxy_cache_lock on;                                   # 过期瞬间并发只放一个回源，其余等它
        # 上游异常（含 403 限流）时返回上一次的旧缓存，下载数据永不因限流断供
        proxy_cache_use_stale error timeout updating http_403 http_429 http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;

        add_header Cache-Control public,max-age=300;
        add_header X-Cache-Status $upstream_cache_status;      # HIT/MISS/STALE，便于排查缓存是否生效
    }

    # 带 hash 的静态资源长缓存
    location /assets/ {
        expires 1y;
        add_header Cache-Control public,immutable;
    }

    # index.html 不缓存，保证发版即时可见
    location = /index.html {
        add_header Cache-Control no-cache;
    }

    # 单页回退
    location / {
        try_files $uri $uri/ /index.html;
    }
}
